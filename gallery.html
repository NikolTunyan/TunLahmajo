<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Tun Lahmajo</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="gallery.css">

    <!-- GSAP -->
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  </head>

 <body>

  <header class="header">
    <div class="logo">TUN <span>LAHMAJO</span></div>
    <button class="back-btn" onclick="history.back()">← Back</button>
  </header>

  <section class="game-screen">

    <div class="overlay"></div>

    <div class="game-container">

      <div class="title">
        <h1>GUESS.<br>THE.<span>DISH.</span></h1>
        <p>Test your taste. Feel the heat.</p>
      </div>

      <button id="chefMode">🔥 CHEF MODE</button>
      <div id="timer"></div>

      <div class="game-card">
        <img id="dishImage" src="">

        <div id="answers" class="answers"></div>

        <div class="game-info">
          <span id="score">Score: 0</span>
          <button id="nextBtn">NEXT →</button>
        </div>

        <p id="feedback"></p>
      </div>

    </div>

  </section>

  <script src="src/gallery.js" defer></script>
  </body>

</html>
