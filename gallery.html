<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Tun Lahmajo</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="gallery.css">

    <!-- GSAP -->
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  </head>

  <body>

  <header class="header">
    <div class="logo">TUN <span>LAHMAJO</span></div>
    <button class="back-btn" onclick="history.back()">← Back</button>
  </header>

  <section class="hero">
    <h1>OUR GALLERY</h1>
    <p>Inside Tun Lahmajo • Food • Atmosphere • Tradition</p>
  </section>

  <!-- QUIZ -->
  <section class="guess-game">

    <h2>🍞 Guess the Dish</h2>

    <button id="chefMode">🔥 Chef Mode</button>
    <span id="timer"></span>

    <div class="game-card">
      <img id="dishImage" src="" alt="dish">

      <div id="answers" class="answers"></div>

      <div class="game-info">
        <span id="score">Score: 0</span>
        <button id="nextBtn">Next ➜</button>
      </div>

      <p id="feedback"></p>
    </div>

  </section>

  <script src="src/gallery.js" defer></script>

  </body>
</html>
